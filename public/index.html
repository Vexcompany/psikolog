<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Psikolog / Psikiater</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header>
      <h1>🧠 AI Psikolog</h1>
      <p class="subtitle">Dengarkan, pahami, dan bimbing tanpa sensor</p>
    </header>
    <div id="chat-container">
      <div id="messages"></div>
      <div id="typing-indicator" style="display: none;">Psikolog sedang mengetik...</div>
    </div>
    <div id="input-area">
      <textarea id="prompt-input" rows="2" placeholder="Ceritakan apa yang Anda rasakan..."></textarea>
      <button id="send-btn">Kirim</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
